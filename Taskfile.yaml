version: '3'

vars:
  GO_VERSION: '1.25'
  GOLANGCI_LINT_VERSION: 'v2.11.2'
  GCI_VERSION: 'v0.14.0'
  GOFUMPT_VERSION: 'v0.9.2'

  BIN_DIR: '{{.ROOT_DIR}}/bin'
  GOLANGCI_LINT: '{{.BIN_DIR}}/golangci-lint'
  GCI: '{{.BIN_DIR}}/gci'
  GOFUMPT: '{{.BIN_DIR}}/gofumpt'

  CONFIG_PATH: '{{.ROOT_DIR}}/config/yaml/example.yaml'

tasks:
  formatters:install:
    desc: "Устанавливает gofumpt и gci"
    cmds:
      - echo '📦 Устанавливаем gofumpt...'
      - GOBIN={{.BIN_DIR}} go install mvdan.cc/gofumpt@{{.GOFUMPT_VERSION}}
      - echo '📦 Устанавливаем gci...'
      - GOBIN={{.BIN_DIR}} go install github.com/daixiang0/gci@{{.GCI_VERSION}}
    status:
      - test -x {{.GOFUMPT}}
      - test -x {{.GCI}}

  golangci-lint:install:
    desc: "Устанавливает golangci-lint"
    cmds:
      - echo '📦 Устанавливаем golangci-lint...'
      - GOBIN={{.BIN_DIR}} go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
    status:
      - test -x {{.GOLANGCI_LINT}}

  setup:
    desc: "Устанавливает все инструменты"
    deps: [formatters:install, golangci-lint:install]

  format:
    desc: "Форматирует код (gofumpt + gci)"
    deps: [formatters:install]
    cmds:
      - echo '🧹 Форматируем код через gofumpt...'
      - find . -type f -name '*.go' ! -path '*/mocks/*' -exec {{.GOFUMPT}} -extra -w {} +
      - echo '📦 Сортируем импорты через gci...'
      - find . -type f -name '*.go' ! -path '*/mocks/*' -exec {{.GCI}} write -s standard -s default -s "prefix(github.com/YanBatytskiy/in_memory_base)" {} +

  lint:
    desc: "Запускает golangci-lint"
    deps: [golangci-lint:install]
    cmds:
      - '{{.GOLANGCI_LINT}} run --allow-parallel-runners ./... --config=.golangci.yml'

  build:
    desc: "Собирает бинарники server и cli в bin/"
    cmds:
      - echo '🔨 Собираем server...'
      - go build -o {{.BIN_DIR}}/server ./cmd/server
      - echo '🔨 Собираем cli...'
      - go build -o {{.BIN_DIR}}/cli ./cmd/cli

  run-server:
    desc: "Запускает сервер с config/yaml/example.yaml"
    cmds:
      - CONFIG_PATH={{.CONFIG_PATH}} go run ./cmd/server

  run-cli:
    desc: "Запускает интерактивный CLI к 127.0.0.1:3323"
    cmds:
      - go run ./cmd/cli -- -address 127.0.0.1:3323

  test:
    desc: "Запускает unit-тесты"
    cmds:
      - echo '🧪 Запускаем тесты...'
      - go test ./...

  race:
    desc: "Запускает тесты с race-детектором"
    cmds:
      - echo '🏁 Запускаем тесты под race-детектором...'
      - go test -race ./...

  test:api:
    desc: "Запускает API-тесты (build-tag integration)"
    cmds:
      - echo '🔗 Запускаем API-тесты...'
      - go test -tags=integration ./internal/integration/...

  bench:
    desc: "Запускает бенчмарки (HashTable, WAL и end-to-end через TCP)"
    cmds:
      - echo '⚡ Запускаем бенчмарки HashTable и WAL...'
      - go test -run='^$' -bench=. -benchmem ./internal/database/storage/engine/in_memory/...
      - echo '⚡ Запускаем end-to-end бенчмарк через TCP...'
      - go test -run='^$' -bench=. -benchmem -tags=integration ./internal/integration/...

  cover:
    desc: "Coverage с per-function отчётом"
    cmds:
      - echo '📊 Собираем coverage...'
      - go test -cover -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out

  vet:
    desc: "Запускает go vet"
    cmds:
      - go vet ./...

  mocks:
    desc: "Перегенерирует моки через mockery"
    cmds:
      - echo '🔄 Генерируем моки...'
      - go generate ./...

  tidy:
    desc: "Приводит go.mod и go.sum в порядок"
    cmds:
      - go mod tidy

  clean:
    desc: "Удаляет артефакты сборки и runtime-данные"
    cmds:
      - echo '🧹 Чистим bin/, coverage.out, storage/wal...'
      - rm -rf {{.BIN_DIR}} coverage.out storage/wal

  check:
    desc: "Полная проверка: format + vet + lint + test + race"
    deps: [format, vet, lint, test, race]
